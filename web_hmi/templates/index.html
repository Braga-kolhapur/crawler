<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<title>Coverage HMI</title>
<style>
/* ── Reset & tokens ────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117; --surf:#161b22; --surf2:#21262d; --border:#30363d;
  --text:#c9d1d9; --dim:#6e7681; --accent:#1f6feb;
  --green:#22c55e; --orange:#f97316; --red:#ef4444; --blue:#60a5fa;
  --hdr:52px; --tabs:40px; --top:92px; --bot:245px; --man-bot:170px;
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);
  color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  touch-action:none}

/* ── Header ────────────────────────────────────────────────────── */
#hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr);
  background:var(--surf);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:10px;z-index:200}
#hdr h1{font-size:15px;font-weight:700;flex:1}
.ros-dot{width:9px;height:9px;border-radius:50%;background:var(--dim);flex-shrink:0;
  transition:background .3s,box-shadow .3s}
.ros-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.ros-dot.off{background:var(--red)}
#ros-lbl{font-size:11px;color:var(--dim)}

/* ── Tab bar ────────────────────────────────────────────────────── */
#tab-bar{position:fixed;top:var(--hdr);left:0;right:0;height:var(--tabs);
  background:var(--surf);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 8px;gap:4px;z-index:200}
.tab-btn{padding:5px 20px;border:none;border-radius:6px;background:none;
  color:var(--dim);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.tab-btn.active{background:var(--surf2);color:var(--text)}
.tab-btn:not(.active):hover{background:rgba(255,255,255,0.06);color:var(--text)}

/* ── Map area (AUTO tab) ────────────────────────────────────────── */
#map-wrap{position:fixed;top:var(--top);left:0;right:0;bottom:var(--bot);
  background:#000;overflow:hidden;touch-action:none}
#map-canvas{display:block;width:100%;height:100%;touch-action:none;cursor:grab}
#map-canvas:active{cursor:grabbing}
#loading{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:#000;
  color:var(--dim);font-size:13px;gap:10px;z-index:10}
.spinner{width:28px;height:28px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Floating status card */
#map-status{position:absolute;top:10px;right:10px;background:rgba(22,27,34,.93);
  border:1px solid var(--border);border-radius:10px;padding:9px 13px;
  min-width:145px;pointer-events:none;backdrop-filter:blur(6px)}
.ms-row{display:flex;align-items:baseline;gap:6px}
.ms-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px}
.ms-zone{font-size:26px;font-weight:800;line-height:1;margin:2px 0}
.ms-pbar{height:5px;background:var(--surf2);border-radius:3px;margin-top:5px;overflow:hidden}
.ms-pfill{height:100%;background:var(--green);border-radius:3px;transition:width .5s}
.ms-pct{font-size:11px;color:var(--green);text-align:right;margin-top:2px}

/* Legend */
#legend{position:absolute;bottom:8px;left:8px;background:rgba(22,27,34,.85);
  border:1px solid var(--border);border-radius:8px;padding:6px 10px;
  pointer-events:none;display:flex;flex-direction:column;gap:3px}
.leg-row{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--dim)}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* ── Bottom panel (AUTO tab) ────────────────────────────────────── */
#bot-panel{position:fixed;left:0;right:0;bottom:0;height:var(--bot);
  background:var(--surf);border-top:1px solid var(--border);
  display:flex;flex-direction:column;z-index:200;transition:height .25s ease}
#bot-panel.expanded{height:58vh}

#bot-handle{display:flex;align-items:center;justify-content:center;
  padding:8px 0 4px;cursor:pointer;flex-shrink:0}
.handle-bar{width:38px;height:4px;background:var(--border);border-radius:2px}

#bot-body{display:flex;flex-direction:column;flex:1;overflow:hidden;padding:0 12px 10px}

/* Sequence list */
.sec-title{font-size:10px;color:var(--dim);text-transform:uppercase;
  letter-spacing:.7px;margin-bottom:6px;flex-shrink:0}

#seq-list{flex:1;overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;gap:5px;padding-right:2px}
#seq-list::-webkit-scrollbar{width:3px}
#seq-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Sequence cards */
.seq-card{display:flex;align-items:center;gap:8px;background:var(--surf2);
  border:1.5px solid var(--border);border-radius:9px;padding:7px 10px;
  min-height:48px;cursor:default;user-select:none;flex-shrink:0;
  transition:border-color .15s,opacity .15s}
.seq-card.active{border-color:var(--accent)}
.seq-card.done{border-color:var(--green);opacity:.65}
.seq-card.ghost{opacity:.35;border-style:dashed}
.seq-placeholder{border:2px dashed var(--accent);border-radius:9px;background:rgba(31,111,235,.05)}

.drag-h{color:var(--dim);font-size:17px;padding:4px 2px;cursor:grab;flex-shrink:0}
.drag-h:active{cursor:grabbing}

.zone-badge{width:34px;height:34px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:15px;color:#fff}

.card-info{flex:1;min-width:0}
.card-top{display:flex;align-items:center;gap:6px}
.card-name{font-size:13px;font-weight:600}
.card-pct{font-size:11px;color:var(--dim)}
.card-bar{height:3px;background:var(--surf);border-radius:2px;margin-top:3px;overflow:hidden}
.card-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s}

.card-status{font-size:16px;flex-shrink:0}
.btn-del{background:none;border:none;color:var(--dim);font-size:17px;
  cursor:pointer;padding:4px;flex-shrink:0;line-height:1}
.btn-del:hover{color:var(--red)}

.seq-empty{display:flex;align-items:center;justify-content:center;
  height:60px;color:var(--dim);font-size:12px}

/* Control buttons */
#controls{display:flex;gap:6px;padding-top:8px;flex-shrink:0}
.cbtn{flex:1;padding:12px 0;border:none;border-radius:8px;
  font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;
  -webkit-font-smoothing:antialiased}
.cbtn:active{opacity:.75;transform:scale(.97)}
.cbtn:disabled{opacity:.38;cursor:not-allowed;transform:none}
.cbtn-start{background:var(--green);color:#000}
.cbtn-pause{background:var(--surf2);color:var(--text);border:1px solid var(--border)}
.cbtn-stop{background:var(--red);color:#fff}
.cbtn-fit{flex:0 0 auto;padding:12px 14px;
  background:var(--surf2);color:var(--dim);border:1px solid var(--border)}

/* Node status row in auto tab */
#auto-nd-row{display:flex;gap:14px;padding-top:6px;flex-shrink:0}
.auto-nd-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--dim)}

/* ── Joystick area (MANUAL tab) ─────────────────────────────────── */
#joy-wrap{position:fixed;top:var(--top);left:0;right:0;bottom:var(--man-bot);
  background:#000;overflow:hidden;touch-action:none;display:none}
#joy-canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}

/* Speed overlay */
#speed-overlay{position:absolute;top:10px;left:10px;
  background:rgba(22,27,34,.88);border:1px solid var(--border);border-radius:8px;
  padding:7px 12px;pointer-events:none;line-height:1.6}
.sp-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim)}
.sp-lbl{min-width:14px}
.sp-val{font-family:monospace;font-size:14px;font-weight:700;color:var(--text);
  min-width:52px;text-align:right}
.sp-unit{font-size:10px}

/* Live map picture-in-picture */
#live-map-pip{position:absolute;top:10px;right:10px;width:130px;height:130px;
  background:var(--surf2);border:1px solid var(--border);border-radius:8px;
  overflow:hidden}
#live-map-canvas{width:100%;height:100%;image-rendering:pixelated;display:block}
.pip-lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);
  text-align:center;font-size:9px;color:var(--dim);padding:2px 0}

/* ── Manual bottom panel (MANUAL tab) ──────────────────────────── */
#manual-panel{position:fixed;left:0;right:0;bottom:0;height:var(--man-bot);
  background:var(--surf);border-top:1px solid var(--border);
  display:none;flex-direction:column;z-index:200;padding:10px 14px;gap:7px}

/* Node status dots */
.nd{display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--dim);vertical-align:middle;transition:background .3s,box-shadow .3s}
.nd.on{background:var(--green);box-shadow:0 0 5px var(--green)}
.nd.off{background:var(--red)}
.nd-row{display:flex;gap:14px;align-items:center;font-size:11px;color:var(--dim)}
.nd-item{display:flex;align-items:center;gap:4px}

/* Manual action buttons */
.man-btns{display:flex;gap:6px}
.man-btn{flex:1;padding:11px 6px;border-radius:8px;border:1px solid var(--border);
  background:var(--surf2);color:var(--text);font-size:12px;font-weight:600;
  cursor:pointer;transition:opacity .15s,transform .1s;-webkit-font-smoothing:antialiased}
.man-btn:active{opacity:.7;transform:scale(.97)}
.man-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.man-btn-g{border-color:var(--green);color:var(--green)}
.man-btn-r{border-color:var(--red);color:var(--red)}

/* Save map row */
.save-row{display:flex;gap:6px;align-items:center}
.save-row input{flex:1;padding:9px 10px;background:var(--surf2);
  border:1px solid var(--border);color:var(--text);border-radius:8px;
  font-size:12px;outline:none;min-width:0}
.save-row input:focus{border-color:var(--accent)}
.save-row .man-btn{flex:0 0 auto;padding:9px 12px}

/* ── Toast ──────────────────────────────────────────────────────── */
#toast{position:fixed;bottom:calc(var(--bot) + 10px);left:50%;
  transform:translateX(-50%);background:var(--surf2);color:var(--text);
  border:1px solid var(--border);padding:8px 18px;border-radius:20px;
  font-size:12px;z-index:300;opacity:0;transition:opacity .2s;
  pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
#toast.manual-mode{bottom:calc(var(--man-bot) + 10px)}
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────────────── -->
<header id="hdr">
  <h1>Coverage HMI</h1>
  <span id="ros-lbl">ROS</span>
  <div class="ros-dot" id="ros-dot"></div>
</header>

<!-- ── TAB BAR ───────────────────────────────────────────────────── -->
<div id="tab-bar">
  <button class="tab-btn"        data-tab="auto">⚙ Auto</button>
  <button class="tab-btn active" data-tab="manual">🕹 Manual</button>
</div>

<!-- ══════════════════════════════════════════════════════════════════
     AUTO TAB
     ══════════════════════════════════════════════════════════════ -->

<!-- Map canvas -->
<div id="map-wrap" class="auto-view" style="display:none">
  <canvas id="map-canvas"></canvas>

  <div id="loading">
    <div class="spinner"></div>
    <span>Loading map…</span>
  </div>

  <!-- Floating status card -->
  <div id="map-status">
    <div class="ms-label">Current zone</div>
    <div class="ms-zone" id="ms-zone">—</div>
    <div class="ms-pbar"><div class="ms-pfill" id="ms-bar" style="width:0%"></div></div>
    <div class="ms-pct" id="ms-pct">0.0 %</div>
  </div>

  <!-- Legend -->
  <div id="legend">
    <div class="leg-row"><div class="leg-dot" style="background:var(--green)"></div>Covered</div>
    <div class="leg-row"><div class="leg-dot" style="background:var(--orange)"></div>Remaining</div>
    <div class="leg-row"><div class="leg-dot" style="background:var(--red)"></div>Robot</div>
  </div>
</div>

<!-- Bottom panel -->
<div id="bot-panel" class="auto-view" style="display:none">
  <div id="bot-handle" title="Tap to expand / collapse">
    <div class="handle-bar"></div>
  </div>

  <div id="bot-body">
    <div class="sec-title">Execution Sequence — drag to reorder</div>
    <div id="seq-list"></div>

    <div id="controls">
      <button class="cbtn cbtn-start" id="btn-start"  onclick="cmdStartAutonomy()">▶ Start Robot</button>
      <button class="cbtn cbtn-pause" id="btn-pause"  onclick="cmdPause()" disabled>⏸ Pause</button>
      <button class="cbtn cbtn-stop"  id="btn-stop"   onclick="cmdStopAutonomy()" disabled>⏹ Stop</button>
      <button class="cbtn cbtn-fit"   onclick="fitMap()" title="Fit map">⤢</button>
    </div>

    <!-- Node status row -->
    <div id="auto-nd-row">
      <span class="auto-nd-item"><span class="nd" id="nd-amcl-auto"></span>AMCL</span>
      <span class="auto-nd-item"><span class="nd" id="nd-nav2-auto"></span>Nav2</span>
      <span class="auto-nd-item"><span class="nd" id="nd-slam-auto"></span>SLAM</span>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════
     MANUAL TAB
     ══════════════════════════════════════════════════════════════ -->

<!-- Joystick canvas area -->
<div id="joy-wrap" class="manual-view" style="display:block">
  <canvas id="joy-canvas"></canvas>

  <!-- Speed overlay (top-left) -->
  <div id="speed-overlay">
    <div class="sp-row">
      <span class="sp-lbl">V</span>
      <span class="sp-val" id="joy-linear">0.00</span>
      <span class="sp-unit">m/s</span>
    </div>
    <div class="sp-row">
      <span class="sp-lbl">ω</span>
      <span class="sp-val" id="joy-angular">0.00</span>
      <span class="sp-unit">rad/s</span>
    </div>
  </div>

  <!-- Live SLAM map (top-right, picture-in-picture) -->
  <div id="live-map-pip" title="Live /map topic">
    <canvas id="live-map-canvas" width="130" height="130"></canvas>
    <div class="pip-lbl">Live Map</div>
  </div>
</div>

<!-- Manual controls panel -->
<div id="manual-panel" class="manual-view" style="display:flex">
  <!-- Robot Driver Section -->
  <div class="sec-title" style="margin-bottom:2px">Robot Control</div>

  <!-- Node status -->
  <div class="nd-row">
    <span class="nd-item"><span class="nd" id="nd-robot"></span>Robot Driver</span>
    <span class="nd-item"><span class="nd" id="nd-slam"></span>SLAM</span>
    <span class="nd-item"><span class="nd" id="nd-amcl-m"></span>AMCL</span>
    <span class="nd-item"><span class="nd" id="nd-nav2-m"></span>Nav2</span>
  </div>

  <!-- Robot start/stop -->
  <div class="man-btns">
    <button class="man-btn man-btn-g" id="btn-start-robot"
            onclick="cmdStartRobot()">▶ Start Robot</button>
    <button class="man-btn man-btn-r" id="btn-stop-robot"
            onclick="cmdStopRobot()" disabled>⏹ Stop Robot</button>
  </div>

  <div class="sec-title" style="margin-bottom:2px;margin-top:10px">Mapping</div>

  <!-- Mapping start/stop -->
  <div class="man-btns">
    <button class="man-btn man-btn-g" id="btn-start-mapping"
            onclick="cmdStartMapping()">▶ Start Mapping</button>
    <button class="man-btn man-btn-r" id="btn-stop-mapping"
            onclick="cmdStopMapping()" disabled>⏹ Stop Mapping</button>
  </div>

  <!-- Save map -->
  <div class="save-row">
    <input id="map-name" type="text" placeholder="map name" value="my_map"
           autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="man-btn" onclick="cmdSaveMap()" style="white-space:nowrap">
      💾 Save Map
    </button>
  </div>
</div>

<div id="toast"></div>

<!-- Use CDN for socket.io client library -->
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
// ════════════════════════════════════════════════════════════════════
// GLOBAL STATE
// ════════════════════════════════════════════════════════════════════
let plan   = {};
let appSt  = {
  is_running:false, is_paused:false, current_zone:null,
  coverage_pct:0, robot_x:null, robot_y:null,
  sequence:[], visited:[], ros_connected:false,
};
let visitedSet  = new Set();   // "zone:idx"
let mapImg      = null;
let nodeStatus  = {robot:false, slam:false, amcl:false, nav2:false};
let currentTab  = 'manual';

// Zone palette
const PALETTE = ['#E74C3C','#3498DB','#2ECC71','#F39C12','#9B59B6',
                 '#1ABC9C','#E67E22','#E91E63','#00BCD4','#8BC34A',
                 '#FF5722','#607D8B','#795548','#FFC107'];

// ════════════════════════════════════════════════════════════════════
// SOCKET.IO
// ════════════════════════════════════════════════════════════════════
const socket = io({transports:['websocket','polling']});

socket.on('connect',     ()  => updateRos(true));
socket.on('disconnect',  ()  => { appSt.ros_connected=false; updateRos(false); });
socket.on('state',       (s) => applyState(s));
socket.on('node_status', (ns)=> { nodeStatus={...nodeStatus,...ns}; updateNodeStatusUI(); });
socket.on('toast',       (m) => toast(m));

function applyState(s) {
  appSt = {...appSt, ...s};
  visitedSet = new Set((s.visited||[]).map(v=>`${v.zone}:${v.idx}`));
  updateStatusOverlay();
  renderSequence();
  updateButtons();
}

// ════════════════════════════════════════════════════════════════════
// TAB SWITCHING
// ════════════════════════════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });

  const auto   = tab === 'auto';
  const manual = tab === 'manual';

  // Show/hide auto views
  document.getElementById('map-wrap')   .style.display = auto   ? '' : 'none';
  document.getElementById('bot-panel')  .style.display = auto   ? 'flex' : 'none';

  // Show/hide manual views
  document.getElementById('joy-wrap')    .style.display = manual ? '' : 'none';
  document.getElementById('manual-panel').style.display = manual ? 'flex' : 'none';

  // Toast position
  document.getElementById('toast').classList.toggle('manual-mode', manual);

  if (manual) {
    resizeJoy();
    if (!_joyRafRunning) { _joyRafRunning = true; joyLoop(); }
    startLiveMapPoll();
    fetch('/api/node_status').then(r=>r.json()).then(ns => {
      nodeStatus = {...nodeStatus, ...ns};
      updateNodeStatusUI();
    });
  } else {
    stopCmdVelLoop();
    stopLiveMapPoll();
  }
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ════════════════════════════════════════════════════════════════════
// INITIAL LOAD
// ════════════════════════════════════════════════════════════════════
function init() {
  // Kick off manual mode (default tab) immediately
  resizeJoy();
  if (!_joyRafRunning) { _joyRafRunning = true; joyLoop(); }
  startLiveMapPoll();

  Promise.all([
    fetch('/api/plan').then(r=>r.json()),
    fetch('/api/state').then(r=>r.json()),
    fetch('/api/node_status').then(r=>r.json()),
  ]).then(([planData, stData, nsData]) => {
    plan            = planData.plan || {};
    appSt.sequence  = planData.sequence || [];
    nodeStatus      = {...nodeStatus, ...nsData};
    applyState(stData);
    updateNodeStatusUI();
    loadMapImage();  // pre-load map so it's ready when user switches to Auto
  });
}

function loadMapImage() {
  fetch('/api/map_image').then(r=>r.json()).then(d => {
    if (!d.b64) {
      document.getElementById('loading').querySelector('span').textContent =
        'Map image not found — check pgm_file in plan JSON';
      return;
    }
    mapImg = new Image();
    mapImg.onload = () => {
      document.getElementById('loading').style.display = 'none';
      fitMap();
    };
    mapImg.src = 'data:image/png;base64,' + d.b64;
  });
}

// ════════════════════════════════════════════════════════════════════
// AUTO TAB — MAP CANVAS
// ════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('map-canvas');
const ctx    = canvas.getContext('2d');
let zoom = 1, panX = 0, panY = 0;
let pulse = 0;

function resizeCanvas() {
  const w = document.getElementById('map-wrap');
  canvas.width  = w.clientWidth;
  canvas.height = w.clientHeight;
}
new ResizeObserver(resizeCanvas).observe(document.getElementById('map-wrap'));
resizeCanvas();

function fitMap() {
  if (!mapImg) return;
  const cw = canvas.width, ch = canvas.height;
  zoom = Math.min(cw / mapImg.width, ch / mapImg.height) * 0.96;
  panX = (cw - mapImg.width  * zoom) / 2;
  panY = (ch - mapImg.height * zoom) / 2;
}

function applyZoom(nz, cx, cy) {
  const old = zoom;
  zoom = Math.max(0.08, Math.min(12, nz));
  panX = cx - (cx - panX) * (zoom / old);
  panY = cy - (cy - panY) * (zoom / old);
}

// ── Coordinate transforms ─────────────────────────────────────────
function worldToCanvas(wx, wy) {
  const mi   = plan.map || {};
  const res  = mi.resolution || 0.05;
  const orig = mi.origin     || [0, 0, 0];
  const h    = mi.height_px  || (mapImg ? mapImg.height : 400);
  const px   = (wx - orig[0]) / res;
  const py   = h - (wy - orig[1]) / res;
  return [px * zoom + panX, py * zoom + panY];
}

function pixToCanvas(px, py) {
  return [px * zoom + panX, py * zoom + panY];
}

// ── Render loop ───────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (mapImg) {
    ctx.drawImage(mapImg, panX, panY, mapImg.width * zoom, mapImg.height * zoom);
  } else {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  if (Object.keys(plan).length === 0) { requestAnimationFrame(render); return; }

  const seq   = appSt.sequence;
  const zones = plan.zones || {};

  // Zone fills + outlines
  for (const [key, zone] of Object.entries(zones)) {
    const pb = zone.pixel_bounds;
    if (!pb) continue;
    const [x1, y1] = pixToCanvas(pb.x1, pb.y1);
    const [x2, y2] = pixToCanvas(pb.x2, pb.y2);
    const col      = zone.color || PALETTE[key.charCodeAt(0) % PALETTE.length];
    const isActive = key === appSt.current_zone;

    ctx.save();
    ctx.globalAlpha = isActive ? 0.22 : 0.12;
    ctx.fillStyle   = col;
    ctx.fillRect(x1, y1, x2 - x1, y2 - y1);
    ctx.restore();

    ctx.strokeStyle = isActive ? '#fff' : col;
    ctx.lineWidth   = isActive ? 2.5 : 1.5;
    ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

    if (zoom > 0.25) {
      const fs = Math.max(9, Math.min(22, Math.round(14 * zoom)));
      ctx.font        = `700 ${fs}px sans-serif`;
      ctx.shadowColor = '#000';
      ctx.shadowBlur  = 3;
      ctx.fillStyle   = '#fff';
      ctx.fillText(key.toUpperCase(), x1 + 5, y1 + fs + 4);
      ctx.shadowBlur  = 0;
    }
  }

  // Coverage paths
  for (const key of seq) {
    const zone = zones[key];
    if (zone?.waypoints?.length) drawZonePaths(key, zone);
  }

  drawRobot();

  pulse = (pulse + 0.055) % (Math.PI * 2);
  requestAnimationFrame(render);
}

function drawZonePaths(key, zone) {
  const wps    = zone.waypoints;
  const stripes = {};
  wps.forEach((wp, idx) => {
    if (wp.type === 'transition') return;
    const s = wp.stripe ?? 0;
    (stripes[s] = stripes[s] || []).push({wp, idx});
  });

  const dotR = Math.max(2, 2.5 * zoom);

  for (const pts of Object.values(stripes)) {
    if (!pts.length) continue;
    for (let i = 0; i < pts.length - 1; i++) {
      const a = pts[i], b = pts[i + 1];
      const aVis = visitedSet.has(`${key}:${a.idx}`);
      const bVis = visitedSet.has(`${key}:${b.idx}`);
      const [ax, ay] = worldToCanvas(a.wp.x, a.wp.y);
      const [bx, by] = worldToCanvas(b.wp.x, b.wp.y);
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(bx, by);
      ctx.strokeStyle = (aVis && bVis) ? '#22c55e' : '#f97316';
      ctx.lineWidth   = Math.max(1.5, 2.5 * zoom);
      ctx.stroke();
    }
    for (const {wp, idx} of pts) {
      const [cx2, cy2] = worldToCanvas(wp.x, wp.y);
      ctx.beginPath();
      ctx.arc(cx2, cy2, dotR, 0, Math.PI * 2);
      ctx.fillStyle = visitedSet.has(`${key}:${idx}`) ? '#22c55e' : '#f97316';
      ctx.fill();
    }
  }

  wps.forEach((wp, idx) => {
    if (wp.type !== 'transition' || idx === 0) return;
    const prev = wps[idx - 1];
    const [ax, ay] = worldToCanvas(prev.x, prev.y);
    const [bx, by] = worldToCanvas(wp.x, wp.y);
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = 'rgba(249,115,22,.35)';
    ctx.lineWidth   = 1;
    ctx.stroke();
    ctx.setLineDash([]);
  });

  const first = wps.find(wp => wp.type === 'coverage');
  if (first) {
    const [fx, fy] = worldToCanvas(first.x, first.y);
    const col      = zone.color || '#3498DB';
    ctx.beginPath();
    ctx.arc(fx, fy, dotR + 2, 0, Math.PI * 2);
    ctx.fillStyle   = '#fff';
    ctx.fill();
    ctx.strokeStyle = col;
    ctx.lineWidth   = 2;
    ctx.stroke();
  }
}

function drawRobot() {
  if (appSt.robot_x === null || appSt.robot_y === null) return;
  const [rx, ry] = worldToCanvas(appSt.robot_x, appSt.robot_y);

  const pr    = 7 + 3.5 * Math.abs(Math.sin(pulse));
  const alpha = 0.55 - 0.35 * Math.abs(Math.sin(pulse));
  ctx.beginPath();
  ctx.arc(rx, ry, pr, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(239,68,68,${alpha.toFixed(2)})`;
  ctx.lineWidth   = 2.5;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(rx, ry, 6, 0, Math.PI * 2);
  ctx.fillStyle   = '#ef4444';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  if (appSt.robot_yaw != null) {
    const len = 14;
    const ex  = rx + len * Math.cos(appSt.robot_yaw);
    const ey  = ry - len * Math.sin(appSt.robot_yaw);
    ctx.beginPath();
    ctx.moveTo(rx, ry);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth   = 2;
    ctx.stroke();
  }
}

render();

// ── Touch / Mouse gestures (map pan + zoom) ──────────────────────
let _dragging = false, _dragAnchor = null, _pinchAnchor = null;

canvas.addEventListener('touchstart', onTouchStart, {passive:false});
canvas.addEventListener('touchmove',  onTouchMove,  {passive:false});
canvas.addEventListener('touchend',   onTouchEnd,   {passive:false});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  applyZoom(zoom * (e.deltaY < 0 ? 1.12 : 1/1.12),
            e.clientX - r.left, e.clientY - r.top);
}, {passive:false});

canvas.addEventListener('mousedown', e => {
  _dragging   = true;
  _dragAnchor = {mx:e.clientX, my:e.clientY, px:panX, py:panY};
});
canvas.addEventListener('mousemove', e => {
  if (!_dragging || !_dragAnchor) return;
  panX = _dragAnchor.px + e.clientX - _dragAnchor.mx;
  panY = _dragAnchor.py + e.clientY - _dragAnchor.my;
});
canvas.addEventListener('mouseup',    () => { _dragging = false; });
canvas.addEventListener('mouseleave', () => { _dragging = false; });

function onTouchStart(e) {
  e.preventDefault();
  const t = e.touches;
  if (t.length === 1) {
    _dragging    = true;
    _pinchAnchor = null;
    _dragAnchor  = {mx:t[0].clientX, my:t[0].clientY, px:panX, py:panY};
  } else if (t.length === 2) {
    _dragging = false;
    const r   = canvas.getBoundingClientRect();
    _pinchAnchor = {
      dist: Math.hypot(t[1].clientX-t[0].clientX, t[1].clientY-t[0].clientY),
      zoom,
      midX: (t[0].clientX+t[1].clientX)/2 - r.left,
      midY: (t[0].clientY+t[1].clientY)/2 - r.top,
    };
  }
}
function onTouchMove(e) {
  e.preventDefault();
  const t = e.touches;
  if (t.length === 1 && _dragging && _dragAnchor) {
    panX = _dragAnchor.px + t[0].clientX - _dragAnchor.mx;
    panY = _dragAnchor.py + t[0].clientY - _dragAnchor.my;
  } else if (t.length === 2 && _pinchAnchor) {
    const dist = Math.hypot(t[1].clientX-t[0].clientX, t[1].clientY-t[0].clientY);
    applyZoom(_pinchAnchor.zoom * dist / _pinchAnchor.dist,
              _pinchAnchor.midX, _pinchAnchor.midY);
  }
}
function onTouchEnd(e) {
  const t = e.touches;
  if      (t.length === 0) { _dragging = false; _pinchAnchor = null; }
  else if (t.length === 1) {
    _dragging   = true;
    _dragAnchor = {mx:t[0].clientX, my:t[0].clientY, px:panX, py:panY};
  }
}

// ════════════════════════════════════════════════════════════════════
// AUTO TAB — SEQUENCE UI
// ════════════════════════════════════════════════════════════════════
function zoneColor(key) {
  const z = (plan.zones||{})[key];
  return z?.color || PALETTE[key.charCodeAt(0) % PALETTE.length];
}

function zonePct(key) {
  const wps = (plan.zones?.[key]?.waypoints || []);
  let total = 0, done = 0;
  wps.forEach((wp, idx) => {
    if (wp.type !== 'coverage') return;
    total++;
    if (visitedSet.has(`${key}:${idx}`)) done++;
  });
  return total ? Math.round(done / total * 100) : 0;
}

function zoneIcon(key) {
  const pct = zonePct(key);
  if (pct >= 100)                    return {icon:'✓', col:'var(--green)'};
  if (key === appSt.current_zone)    return {icon:'▶', col:'var(--accent)'};
  return {icon:'○', col:'var(--dim)'};
}

function renderSequence() {
  const list = document.getElementById('seq-list');
  list.innerHTML = '';
  const seq = appSt.sequence;

  if (!seq.length) {
    list.innerHTML = '<div class="seq-empty">No zones in plan — load a coverage_plan.json</div>';
    return;
  }

  seq.forEach(key => {
    const col  = zoneColor(key);
    const pct  = zonePct(key);
    const {icon, col: icol} = zoneIcon(key);
    const done = pct >= 100;
    const act  = key === appSt.current_zone;

    const card = document.createElement('div');
    card.className   = `seq-card${act?' active':''}${done?' done':''}`;
    card.dataset.key = key;
    card.innerHTML   = `
      <span class="drag-h" title="Drag to reorder">⠿</span>
      <div class="zone-badge" style="background:${col}">${key.toUpperCase()}</div>
      <div class="card-info">
        <div class="card-top">
          <span class="card-name">${key.toUpperCase()}</span>
          <span class="card-pct">${pct}%</span>
        </div>
        <div class="card-bar"><div class="card-fill" style="width:${pct}%"></div></div>
      </div>
      <span class="card-status" style="color:${icol}">${icon}</span>
      <button class="btn-del" title="Remove" onclick="removeZone('${key}')">×</button>`;
    list.appendChild(card);
  });

  initDragSort(list);
}

function removeZone(key) {
  appSt.sequence = appSt.sequence.filter(k => k !== key);
  socket.emit('update_sequence', {sequence: appSt.sequence});
  renderSequence();
}

// Drag-to-reorder (Pointer Events)
function initDragSort(list) {
  let ghost = null, ph = null, draggingCard = null, oy = 0;

  list.addEventListener('pointerdown', e => {
    const handle = e.target.closest('.drag-h');
    if (!handle) return;
    const card = handle.closest('.seq-card');
    if (!card) return;
    e.preventDefault();

    const r = card.getBoundingClientRect();
    oy = e.clientY - r.top;

    ghost = card.cloneNode(true);
    ghost.style.cssText = [
      `position:fixed`,`width:${r.width}px`,`left:${r.left}px`,
      `top:${r.top}px`,`z-index:9999`,`pointer-events:none`,
      `opacity:.88`,`box-shadow:0 10px 36px rgba(0,0,0,.55)`,
      `border-radius:9px`,`transition:none`
    ].join(';');
    document.body.appendChild(ghost);

    ph = document.createElement('div');
    ph.className  = 'seq-placeholder';
    ph.style.height = r.height + 'px';
    card.parentNode.insertBefore(ph, card);

    draggingCard = card;
    card.classList.add('ghost');
    card.setPointerCapture(e.pointerId);

    const onMove = mv => {
      ghost.style.top = (mv.clientY - oy) + 'px';
      const siblings = [...list.querySelectorAll('.seq-card:not(.ghost)')];
      let placed = false;
      for (const sib of siblings) {
        if (mv.clientY < sib.getBoundingClientRect().top + sib.offsetHeight / 2) {
          list.insertBefore(ph, sib); placed = true; break;
        }
      }
      if (!placed) list.appendChild(ph);
    };

    const onUp = () => {
      ph.parentNode.insertBefore(draggingCard, ph);
      draggingCard.classList.remove('ghost');
      ghost.remove();
      ph.remove();
      const newSeq = [...list.querySelectorAll('.seq-card')].map(c => c.dataset.key);
      appSt.sequence = newSeq;
      socket.emit('update_sequence', {sequence: newSeq});
      ghost = ph = draggingCard = null;
      card.removeEventListener('pointermove', onMove);
      card.removeEventListener('pointerup',   onUp);
    };

    card.addEventListener('pointermove', onMove);
    card.addEventListener('pointerup',   onUp);
  });
}

// ════════════════════════════════════════════════════════════════════
// MANUAL TAB — VIRTUAL JOYSTICK
// ════════════════════════════════════════════════════════════════════
const MAX_LINEAR  = 0.3;   // m/s
const MAX_ANGULAR = 0.8;   // rad/s

let joyActive     = false;
let joyDX = 0, joyDY = 0;
let joyPointerId  = null;
let _joyRafRunning = false;
let _cmdVelInterval = null;

const joyCanvas = document.getElementById('joy-canvas');
const joyCtx    = joyCanvas.getContext('2d');

function resizeJoy() {
  const wrap = document.getElementById('joy-wrap');
  if (wrap.clientWidth === 0 || wrap.clientHeight === 0) return;
  joyCanvas.width  = wrap.clientWidth;
  joyCanvas.height = wrap.clientHeight;
}
new ResizeObserver(() => {
  if (currentTab === 'manual') resizeJoy();
}).observe(document.getElementById('joy-wrap'));

function joyLoop() {
  if (currentTab !== 'manual') { _joyRafRunning = false; return; }
  drawJoy();
  requestAnimationFrame(joyLoop);
}

function drawJoy() {
  const w = joyCanvas.width, h = joyCanvas.height;
  joyCtx.clearRect(0, 0, w, h);
  if (!w || !h) return;

  const cx = w / 2, cy = h / 2;
  const R  = Math.min(cx, cy) * 0.65;
  const TR = R * 0.28;

  // Outer ring (made more visible)
  joyCtx.beginPath();
  joyCtx.arc(cx, cy, R, 0, Math.PI * 2);
  joyCtx.fillStyle = 'rgba(96,165,250,0.08)';  // Brighter blue tint
  joyCtx.fill();
  joyCtx.strokeStyle = 'rgba(96,165,250,0.5)';  // Much more visible
  joyCtx.lineWidth = 3;
  joyCtx.stroke();

  // Inner ring (made more visible)
  joyCtx.beginPath();
  joyCtx.arc(cx, cy, R * 0.5, 0, Math.PI * 2);
  joyCtx.strokeStyle = 'rgba(255,255,255,0.3)';  // More visible
  joyCtx.lineWidth = 2;
  joyCtx.stroke();

  // Crosshair lines (made more visible)
  joyCtx.setLineDash([5, 5]);
  joyCtx.strokeStyle = 'rgba(255,255,255,0.25)';  // More visible
  joyCtx.lineWidth = 2;
  joyCtx.beginPath();
  joyCtx.moveTo(cx - R, cy); joyCtx.lineTo(cx + R, cy);
  joyCtx.moveTo(cx, cy - R); joyCtx.lineTo(cx, cy + R);
  joyCtx.stroke();
  joyCtx.setLineDash([]);

  // Direction labels (made more visible)
  const fs = Math.max(16, Math.min(24, R * 0.18));
  joyCtx.font          = `bold ${fs}px sans-serif`;
  joyCtx.fillStyle     = 'rgba(255,255,255,0.6)';  // Much more visible
  joyCtx.textAlign     = 'center';
  joyCtx.textBaseline  = 'middle';
  joyCtx.fillText('▲', cx,           cy - R * 0.76);
  joyCtx.fillText('▼', cx,           cy + R * 0.76);
  joyCtx.fillText('◄', cx - R * 0.76, cy);
  joyCtx.fillText('►', cx + R * 0.76, cy);
  joyCtx.textBaseline = 'alphabetic';

  // Thumb (made more visible)
  const tx = cx + (joyActive ? joyDX * R : 0);
  const ty = cy + (joyActive ? joyDY * R : 0);
  const g  = joyCtx.createRadialGradient(tx, ty, 0, tx, ty, TR);
  if (joyActive) {
    g.addColorStop(0, '#60a5fa');
    g.addColorStop(1, 'rgba(59,130,246,0.5)');  // More visible when active
  } else {
    g.addColorStop(0, 'rgba(255,255,255,0.9)');  // Much more visible when idle
    g.addColorStop(1, 'rgba(255,255,255,0.3)');
  }
  joyCtx.beginPath();
  joyCtx.arc(tx, ty, TR, 0, Math.PI * 2);
  joyCtx.fillStyle   = g;
  joyCtx.fill();
  joyCtx.strokeStyle = joyActive ? '#3b82f6' : 'rgba(255,255,255,0.7)';  // More visible
  joyCtx.lineWidth   = 3;
  joyCtx.stroke();
}

// ── Joystick pointer events ───────────────────────────────────────
joyCanvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  joyCanvas.setPointerCapture(e.pointerId);
  joyActive    = true;
  joyPointerId = e.pointerId;
  _updateJoy(e);
  startCmdVelLoop();
}, {passive: false});

joyCanvas.addEventListener('pointermove', e => {
  if (!joyActive || e.pointerId !== joyPointerId) return;
  e.preventDefault();
  _updateJoy(e);
}, {passive: false});

joyCanvas.addEventListener('pointerup', e => {
  if (e.pointerId === joyPointerId) _joyRelease();
});
joyCanvas.addEventListener('pointercancel', e => {
  if (e.pointerId === joyPointerId) _joyRelease();
});

function _updateJoy(e) {
  const r = joyCanvas.getBoundingClientRect();
  const w = joyCanvas.width, h = joyCanvas.height;
  const R = Math.min(w, h) / 2 * 0.65;
  let dx = (e.clientX - r.left) - w / 2;
  let dy = (e.clientY - r.top)  - h / 2;
  const d = Math.hypot(dx, dy);
  if (d > R) { dx = dx / d * R; dy = dy / d * R; }
  joyDX = dx / R;
  joyDY = dy / R;
  _updateSpeedDisplay();
}

function _joyRelease() {
  joyActive = false;
  joyDX = 0; joyDY = 0;
  stopCmdVelLoop();
  _updateSpeedDisplay();
}

function _updateSpeedDisplay() {
  document.getElementById('joy-linear') .textContent = (-joyDY * MAX_LINEAR) .toFixed(2);
  document.getElementById('joy-angular').textContent = (-joyDX * MAX_ANGULAR).toFixed(2);
}

// ── cmd_vel publish loop (10 Hz while joystick held) ──────────────
function startCmdVelLoop() {
  if (_cmdVelInterval) return;
  _cmdVelInterval = setInterval(() => {
    if (!joyActive) return;
    socket.emit('cmd_vel', {
      linear_x:  -joyDY * MAX_LINEAR,
      angular_z: -joyDX * MAX_ANGULAR,
    });
  }, 100);
}

function stopCmdVelLoop() {
  clearInterval(_cmdVelInterval);
  _cmdVelInterval = null;
  socket.emit('cmd_vel', {linear_x: 0, angular_z: 0});
  document.getElementById('joy-linear') .textContent = '0.00';
  document.getElementById('joy-angular').textContent = '0.00';
}

// ════════════════════════════════════════════════════════════════════
// MANUAL TAB — LIVE MAP POLL
// ════════════════════════════════════════════════════════════════════
let _liveMapInterval = null;
const liveMapCanvas = document.getElementById('live-map-canvas');
const liveMapCtx    = liveMapCanvas.getContext('2d');

function startLiveMapPoll() {
  if (_liveMapInterval) return;
  fetchLiveMap();
  _liveMapInterval = setInterval(fetchLiveMap, 2000);
}

function stopLiveMapPoll() {
  clearInterval(_liveMapInterval);
  _liveMapInterval = null;
}

function fetchLiveMap() {
  fetch('/api/live_map_image').then(r => r.json()).then(d => {
    const w = liveMapCanvas.width, h = liveMapCanvas.height;
    liveMapCtx.clearRect(0, 0, w, h);
    if (!d.b64) {
      liveMapCtx.fillStyle = '#0d1117';
      liveMapCtx.fillRect(0, 0, w, h);
      liveMapCtx.fillStyle    = 'rgba(255,255,255,0.18)';
      liveMapCtx.font         = '9px sans-serif';
      liveMapCtx.textAlign    = 'center';
      liveMapCtx.textBaseline = 'middle';
      liveMapCtx.fillText('No /map topic', w / 2, h / 2);
      liveMapCtx.textBaseline = 'alphabetic';
      return;
    }
    const img = new Image();
    img.onload = () => liveMapCtx.drawImage(img, 0, 0, w, h);
    img.src = 'data:image/png;base64,' + d.b64;
  }).catch(() => {});
}

// ════════════════════════════════════════════════════════════════════
// MANUAL TAB — ROBOT CONTROL COMMANDS
// ════════════════════════════════════════════════════════════════════
function cmdStartRobot() {
  socket.emit('start_robot');
  toast('Starting robot driver…');
}

function cmdStopRobot() {
  socket.emit('stop_robot');
  toast('Stopping robot driver…');
}

// ════════════════════════════════════════════════════════════════════
// MANUAL TAB — MAPPING COMMANDS
// ════════════════════════════════════════════════════════════════════
function cmdStartMapping() {
  socket.emit('start_mapping');
  toast('Starting SLAM mapping…');
}

function cmdStopMapping() {
  socket.emit('stop_mapping');
  toast('Stopping mapping…');
}

function cmdSaveMap() {
  const name = (document.getElementById('map-name').value || '').trim() || 'my_map';
  socket.emit('save_map', {name});
}

// ════════════════════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════════════════════
let _toastT = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (_toastT) clearTimeout(_toastT);
  _toastT = setTimeout(() => el.classList.remove('show'), 2800);
}

// ════════════════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════════════════
window.addEventListener('load', init);
</script>
