obstacle_detector_node:
  ros__parameters:

    # ── Scan topic ────────────────────────────────────────────────────────────
    scan_topic: /scan           # topic to subscribe to (sensor_msgs/LaserScan)

    # ── Box filter (metres, in the sensor / base_link frame) ──────────────────
    # Only points whose (x, y) fall inside this rectangle are considered.
    # Adjust these to match your robot's footprint + a safety margin.
    x_min: -0.15                 # rear  limit  (negative = behind the sensor origin)
    x_max:  0.20                # front limit
    y_min: -0.15                 # right limit  (negative = right side in ROS convention)
    y_max:  0.15                # left  limit

    # ── Clustering ────────────────────────────────────────────────────────────
    # Points are grouped by proximity in scan order (consecutive LiDAR rays).
    # A "cluster" is a run of points where every adjacent pair is < cluster_distance apart.
    cluster_distance: 0.05      # [m] max gap between consecutive points in the same cluster
    min_cluster_size: 5         # min number of points required to count as a real cluster

    # ── Trigger ───────────────────────────────────────────────────────────────
    min_clusters: 1             # how many qualifying clusters needed to trigger detection

    # ── Vicinity box (metres) ─────────────────────────────────────────────────
    # A second, larger bounding box used only for early-warning detection.
    # Publishes /obstacle_in_vicinity (Bool) when any cluster is found here.
    # Same clustering thresholds as the main box are reused.
    # vicinity_debounce: number of consecutive positive frames before going high
    #                    (clear is always immediate)
    vicinity_debounce: 5
    vicinity_x_min: -0.3
    vicinity_x_max:  0.4
    vicinity_y_min: -0.2
    vicinity_y_max:  0.2

